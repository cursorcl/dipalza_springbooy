spring:
  sql:
    init:
      mode: never
  config:
    activate:
      on-profile: prod-sec
  datasource:
    #url: jdbc:sqlserver://192.168.100.102:1433;databaseName=ventas;encrypt=true;trustServerCertificate=true
    url: jdbc:sqlserver://cursorcl.dynalias.com:1777;databaseName=ventas;encrypt=true;trustServerCertificate=true
    username: sa
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    open-in-view: false
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
      ddl-auto: none   # create, update, validate, none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
    show-sql: true
    database-platform: org.hibernate.spatial.dialect.sqlserver.SqlServerDialect
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

logging:
  level:
    root: INFO

app:
  cors:
    allowed-origins: "http://localhost:4200"

security:
  jwt:
    issuer: dipalza
    secret: ${JWT_SECRET}
    access-minutes: 10
    refresh-hr: 5

facturacion:
  datasource:
    #url: jdbc:sqlserver://192.168.100.102:1433;databaseName=Mastersoft;encrypt=true;trustServerCertificate=true
    url: jdbc:sqlserver://cursorcl.dynalias.com:1777;databaseName=Mastersoft;encrypt=true;trustServerCertificate=true
    username: sa
    password: ${FACTURACION_DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver